<!doctype html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment 2</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #error-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: "Courier New", monospace;
      font-size: 14px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 2rem;
    }

    #error-overlay.visible {
      display: flex;
    }

    #error-overlay .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
    }

    #error-overlay .message {
      color: #ff5555;
      max-width: 480px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <canvas id="gpu-canvas"></canvas>
  <div id="error-overlay">
    <span class="label">WebGPU Error</span>
    <span class="message" id="error-message"></span>
  </div>
  <script type="module" src="main.js"></script>
</body>
